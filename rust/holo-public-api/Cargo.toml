[package]
name = "holo-public-api"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4"
actix-limitation = "0.5"
serde_json = "1.0"
config = "0.13"
dotenvy = "0.15"
jsonwebtoken = "9.3"
chrono = "0.4"
utoipa = "5"
mongodb = "2.1"
anyhow = "1"
tracing = "0.1"
deadpool-redis = "0.14"

[dependencies.redis]
version = "0.24"
features = [ "tokio-comp"]

[dependencies.tokio]
version = "1"
features = [ "full" ]

[dependencies.validator]
version = "0.20"
features = [ "derive" ]

[dependencies.serde]
version = "1.0"
features = [ "derive" ]

[dependencies.bson]
version = "2"
features = [ "chrono-0_4" ]

[dependencies.tracing-subscriber]
version = "0.3"
features = [ "env-filter" ]

[dependencies.utoipa-swagger-ui]
version = "9"
features = [ "actix-web" ]

